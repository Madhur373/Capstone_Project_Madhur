name: Playwright Tests CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_folder:
        description: Which test folder to run
        required: false
        default: all
        type: choice
        options:
          - all
          - tests/auth
          - tests/cart
          - tests/catalog
          - tests/checkout
          - tests/payments
          - tests/profile
          - tests/api

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium and system dependencies
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: |
          TEST_FOLDER="${{ github.event.inputs.test_folder || 'all' }}"

          if [ "$TEST_FOLDER" = "all" ]; then
            echo "Running all tests..."
            npm run test:ci
          else
            echo "Running $TEST_FOLDER tests..."
            npx playwright test "$TEST_FOLDER" --project=chromium
          fi
        env:
          CI: true

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Print summary
        if: always()
        run: |
          echo "================================================"
          echo "Branch  : ${{ github.ref_name }}"
          echo "Trigger : ${{ github.event_name }}"
          echo "Folder  : ${{ github.event.inputs.test_folder || 'all' }}"
          echo "Status  : ${{ job.status }}"
          echo "================================================"
